<!DOCTYPE html>
<html lang="en" data-theme="cyber">
<head>
  <script>
    (function(){var t=localStorage.getItem("blog-theme");document.documentElement.setAttribute("data-theme",t==="light"?"light":"cyber");})();
  </script>
  {% include head.html %}
</head>
<body>
  {% include header.html %}
  <main class="main" id="main">
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/menu.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/pjax.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/rotating-subtitle.js' | relative_url }}" defer></script>
</body>
</html>
